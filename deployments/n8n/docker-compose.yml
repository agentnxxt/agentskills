# n8n — Workflow Automation
# Upstream: https://github.com/n8n-io/n8n (Sustainable Use License)
# Note: n8n uses a "Sustainable Use" license — verify compliance for your use case.

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: openatonomyx-n8n
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: ${N8N_DB_HOST:-n8n-db}
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${N8N_DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD:-n8n}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      WEBHOOK_URL: ${N8N_HOST:-http://localhost:5678}/
      N8N_HOST: ${N8N_HOST:-http://localhost:5678}
      N8N_PROTOCOL: https
      NODE_ENV: production
      GENERIC_TIMEZONE: UTC
      # OIDC / Logto SSO — Enterprise feature or community SSO via External Auth
      N8N_EXTERNAL_AUTH_ENABLED: "true"
      N8N_EXTERNAL_AUTH_OIDC_CLIENT_ID: ${N8N_OIDC_CLIENT_ID}
      N8N_EXTERNAL_AUTH_OIDC_CLIENT_SECRET: ${N8N_OIDC_CLIENT_SECRET}
      N8N_EXTERNAL_AUTH_OIDC_ISSUER: ${LOGTO_ENDPOINT:-http://logto:3001}/oidc
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      n8n-db:
        condition: service_healthy
    networks: [default]

  n8n-db:
    image: postgres:16-alpine
    container_name: openatonomyx-n8n-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${N8N_DB_NAME:-n8n}
      POSTGRES_USER: ${N8N_DB_USER:-n8n}
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD:-n8n}
    volumes:
      - n8n-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${N8N_DB_USER:-n8n}"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [default]

volumes:
  n8n-data:
  n8n-db-data:

networks:
  default:
    name: openatonomyx
    external: true
