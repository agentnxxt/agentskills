# Lago — Open-Source Billing & Usage-Based Metering
# Upstream: https://github.com/getlago/lago (AGPL-3.0)

services:
  lago-api:
    image: getlago/api:latest
    container_name: openatonomyx-lago-api
    restart: unless-stopped
    environment:
      LAGO_API_URL: ${LAGO_API_HOST:-http://localhost:3000}
      FRONT_URL: ${LAGO_HOST:-http://localhost:8090}
      DATABASE_URL: postgresql://${LAGO_DB_USER:-lago}:${LAGO_DB_PASSWORD:-lago}@${LAGO_DB_HOST:-lago-db}:5432/${LAGO_DB_NAME:-lago}
      REDIS_URL: redis://${LAGO_REDIS_HOST:-lago-redis}:6379
      SECRET_KEY_BASE: ${LAGO_SECRET_KEY_BASE}
      RSA_PRIVATE_KEY: ${LAGO_RSA_PRIVATE_KEY}
      ENCRYPTION_PRIMARY_KEY: ${LAGO_ENCRYPTION_PRIMARY_KEY}
      ENCRYPTION_KEY_DERIVATION_SALT: ${LAGO_ENCRYPTION_KEY_DERIVATION_SALT}
      ENCRYPTION_DETERMINISTIC_KEY: ${LAGO_ENCRYPTION_DETERMINISTIC_KEY}
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      # OIDC / Logto SSO
      LAGO_OAUTH_PROVIDERS_OPENID_CONNECT_CLIENT_ID: ${LAGO_OIDC_CLIENT_ID}
      LAGO_OAUTH_PROVIDERS_OPENID_CONNECT_CLIENT_SECRET: ${LAGO_OIDC_CLIENT_SECRET}
      LAGO_OAUTH_PROVIDERS_OPENID_CONNECT_ISSUER: ${LOGTO_ENDPOINT:-http://logto:3001}/oidc
    expose:
      - "3000"
    depends_on:
      lago-db:
        condition: service_healthy
      lago-redis:
        condition: service_healthy
    networks: [default]

  lago-front:
    image: getlago/front:latest
    container_name: openatonomyx-lago-front
    restart: unless-stopped
    environment:
      API_URL: ${LAGO_API_HOST:-http://localhost:3000}
      APP_ENV: production
      LAGO_OAUTH_PROVIDERS_OPENID_CONNECT_ENABLED: "true"
    expose:
      - "80"
    depends_on:
      - lago-api
    networks: [default]

  lago-worker:
    image: getlago/api:latest
    container_name: openatonomyx-lago-worker
    restart: unless-stopped
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    environment:
      DATABASE_URL: postgresql://${LAGO_DB_USER:-lago}:${LAGO_DB_PASSWORD:-lago}@${LAGO_DB_HOST:-lago-db}:5432/${LAGO_DB_NAME:-lago}
      REDIS_URL: redis://${LAGO_REDIS_HOST:-lago-redis}:6379
      SECRET_KEY_BASE: ${LAGO_SECRET_KEY_BASE}
      RSA_PRIVATE_KEY: ${LAGO_RSA_PRIVATE_KEY}
      ENCRYPTION_PRIMARY_KEY: ${LAGO_ENCRYPTION_PRIMARY_KEY}
      ENCRYPTION_KEY_DERIVATION_SALT: ${LAGO_ENCRYPTION_KEY_DERIVATION_SALT}
      ENCRYPTION_DETERMINISTIC_KEY: ${LAGO_ENCRYPTION_DETERMINISTIC_KEY}
      RAILS_ENV: production
    depends_on:
      lago-db:
        condition: service_healthy
      lago-redis:
        condition: service_healthy
    networks: [default]

  lago-db:
    image: postgres:16-alpine
    container_name: openatonomyx-lago-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LAGO_DB_NAME:-lago}
      POSTGRES_USER: ${LAGO_DB_USER:-lago}
      POSTGRES_PASSWORD: ${LAGO_DB_PASSWORD:-lago}
    volumes:
      - lago-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LAGO_DB_USER:-lago}"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [default]

  lago-redis:
    image: redis:7-alpine
    container_name: openatonomyx-lago-redis
    restart: unless-stopped
    volumes:
      - lago-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [default]

volumes:
  lago-db-data:
  lago-redis-data:

networks:
  default:
    name: openatonomyx
    external: true
