# Liferay DXP / CE — Enterprise Portal & CMS
# Upstream: https://github.com/liferay/liferay-portal (LGPL-2.1)

services:
  liferay:
    image: liferay/dxp:latest
    container_name: openatonomyx-liferay
    restart: unless-stopped
    environment:
      LIFERAY_JDBC_PERIOD_DEFAULT_PERIOD_DRIVER_UPPERCASEC_LASS_UPPERCASEN_AME: org.postgresql.Driver
      LIFERAY_JDBC_PERIOD_DEFAULT_PERIOD_URL: jdbc:postgresql://${LIFERAY_DB_HOST:-liferay-db}:5432/${LIFERAY_DB_NAME:-lportal}
      LIFERAY_JDBC_PERIOD_DEFAULT_PERIOD_USERNAME: ${LIFERAY_DB_USER:-liferay}
      LIFERAY_JDBC_PERIOD_DEFAULT_PERIOD_PASSWORD: ${LIFERAY_DB_PASSWORD:-liferay}
      # First boot: wizard creates the local admin account
      # After setup, change to "false" and redeploy
      LIFERAY_SETUP_PERIOD_WIZARD_PERIOD_ENABLED: ${LIFERAY_SETUP_WIZARD:-true}
      LIFERAY_ADMIN_PERIOD_EMAIL_PERIOD_FROM_PERIOD_ADDRESS: ${LIFERAY_ADMIN_EMAIL:-admin@example.com}
      # Default admin: test@liferay.com / test (change immediately after first boot)
      # Elasticsearch connection
      LIFERAY_ELASTICSEARCH_PERIOD_CONNECTION_PERIOD_URL: http://liferay-es:9200
      # OIDC / Logto SSO
      LIFERAY_OPENID_PERIOD_CONNECT_PERIOD_ENABLED: "true"
      LIFERAY_OPENID_PERIOD_CONNECT_PERIOD_PROVIDER_PERIOD_NAME: Logto
      LIFERAY_OPENID_PERIOD_CONNECT_PERIOD_CLIENT_PERIOD_ID: ${LIFERAY_OIDC_CLIENT_ID}
      LIFERAY_OPENID_PERIOD_CONNECT_PERIOD_CLIENT_PERIOD_SECRET: ${LIFERAY_OIDC_CLIENT_SECRET}
      LIFERAY_OPENID_PERIOD_CONNECT_PERIOD_DISCOVERY_PERIOD_ENDPOINT: ${LOGTO_ENDPOINT:-http://logto:3001}/oidc/.well-known/openid-configuration
      LIFERAY_OPENID_PERIOD_CONNECT_PERIOD_SCOPES: "openid profile email"
    expose:
      - "8080"
    volumes:
      - liferay-data:/opt/liferay/data
      - liferay-osgi:/opt/liferay/osgi
    depends_on:
      liferay-db:
        condition: service_healthy
      liferay-es:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/jsonws || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks: [default]

  liferay-db:
    image: postgres:16-alpine
    container_name: openatonomyx-liferay-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LIFERAY_DB_NAME:-lportal}
      POSTGRES_USER: ${LIFERAY_DB_USER:-liferay}
      POSTGRES_PASSWORD: ${LIFERAY_DB_PASSWORD:-liferay}
    volumes:
      - liferay-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LIFERAY_DB_USER:-liferay}"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [default]

  liferay-es:
    image: elasticsearch:8.13.0
    container_name: openatonomyx-liferay-es
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - liferay-es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [default]

volumes:
  liferay-data:
  liferay-db-data:
  liferay-es-data:
  liferay-osgi:

networks:
  default:
    name: openatonomyx
    external: true
