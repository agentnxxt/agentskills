# /etc/nginx/sites-available/identity-fabric
# Proxies identity.opensaasapps.com → localhost:8091 (identity-fabric container)

server {
    listen 80;
    server_name identity.opensaasapps.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name identity.opensaasapps.com;

    # TLS — managed by Certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/identity.opensaasapps.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/identity.opensaasapps.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options           DENY;
    add_header X-Content-Type-Options    nosniff;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Proxy to FastAPI container
    location / {
        proxy_pass         http://127.0.0.1:8091;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Health check — no auth required
    location /health {
        proxy_pass http://127.0.0.1:8091/health;
        access_log off;
    }

    # Block access to internal ops docs in production (optional — remove to expose Swagger)
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://127.0.0.1:8091$request_uri;
        # Uncomment to restrict to internal IPs only:
        # allow 10.0.0.0/8;
        # deny all;
    }
}
